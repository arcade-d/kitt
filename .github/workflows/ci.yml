name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Gates qualité
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test --coverage

      # APK debug KITT (adapters réels, arm64 pour Pixel 7)
      - name: Build debug APK
        run: flutter build apk --debug --dart-define=KITT_ADAPTERS=real --target-platform android-arm64

      # Artefact téléchargeable, mis en avant
      - name: Upload KITT debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kitt-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
