name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Gates qualité
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test --coverage

      # Récupère STT+TTS dans assets/models/voice.tar (poids non commités)
      - name: Fetch voice models into APK assets
        run: bash tool/fetch_voice_assets.sh

      # APK debug KITT (adapters réels, split par ABI -> arm64 seul pour Pixel 7)
      - name: Build debug APK (arm64)
        run: flutter build apk --debug --dart-define=KITT_ADAPTERS=real --split-per-abi

      # Artefact téléchargeable, mis en avant (APK arm64-v8a pour Pixel 7)
      - name: Upload KITT debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kitt-debug-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          if-no-files-found: error
          retention-days: 14
