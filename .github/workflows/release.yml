name: release

# Produit un APK KITT **versionné** (release, voix STT/TTS embarquées).
#   - Sur tag `vX.Y.Z` : build + publication d'une Release GitHub avec l'APK.
#   - En manuel (workflow_dispatch) : build + APK en artefact téléchargeable.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (sans le préfixe v) ; défaut = version pubspec + sha'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # nécessaire pour créer la Release GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Garde-fou rapide (le tag est censé être coupé d'un main vert).
      - run: flutter analyze

      # Détermine la version (entrées non fiables passées par env, puis nettoyées).
      - name: Determine version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            v="${REF_NAME#v}"
          elif [ -n "$INPUT_VERSION" ]; then
            v="${INPUT_VERSION#v}"
          else
            base="$(grep '^version:' pubspec.yaml | sed 's/version: *//; s/+.*//')"
            v="${base}-${GITHUB_SHA::7}"
          fi
          v="$(printf '%s' "$v" | tr -cd 'A-Za-z0-9._-')"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      # Voix STT/TTS embarquées dans l'APK (poids non commités).
      - name: Fetch voice models into APK assets
        run: bash tool/fetch_voice_assets.sh

      # APK release arm64-v8a (Pixel 7), adapters réels. Signé clé debug (sideload).
      - name: Build release APK (arm64)
        run: flutter build apk --release --dart-define=KITT_ADAPTERS=real --split-per-abi

      - name: Rename versioned APK
        id: apk
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/kitt-${VERSION}-arm64-v8a.apk"
          echo "path=dist/kitt-${VERSION}-arm64-v8a.apk" >> "$GITHUB_OUTPUT"
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitt-release-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      # Sur tag uniquement : publie une Release GitHub avec l'APK attaché.
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          APK: ${{ steps.apk.outputs.path }}
        run: |
          gh release create "$TAG" "$APK" \
            --title "KITT $TAG" \
            --notes "APK arm64-v8a (Pixel 7). Voix STT/TTS embarquées ; le cerveau (CroissantLLM, ~830 Mo) se télécharge au 1er lancement. Build release signé avec la clé debug (sideload) — voir TODO de signature dans android/app/build.gradle.kts."
