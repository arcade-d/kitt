include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Le squelette comporte des ports/adapters volontairement incomplets.
    todo: ignore

linter:
  rules:
    - prefer_final_locals
    - prefer_const_constructors
    - avoid_print
    - require_trailing_commas
