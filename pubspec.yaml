name: kitt
description: >-
  Compagnon vocal local inspiré de K2000 — pipeline vocal on-device
  (wake-word → STT → contexte → LLM → TTS → audio), UI Flame.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # Rendu animé (scanner K2000 + modulateur vocal)
  flame: ^1.18.0
  # Gestion d'état
  flutter_riverpod: ^2.5.1
  # Identifiants
  ulid: ^2.0.0
  # Pipeline vocal réel (adapters portés de Tachikoma)
  sherpa_onnx: ^1.12.33
  record: ^6.2.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/persona/
